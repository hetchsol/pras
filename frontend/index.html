<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Requisition Approval System (PRAS)</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <!-- SheetJS for XLSX parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        /* Theme CSS Variables
           Identity is blue / white / black. Neutrals carry a faint blue
           undertone so the whole app reads as one family. Semantic colors
           (success/danger/warning) are kept for meaning-bearing UI only —
           status badges, validation, etc. — not decoration. */
        :root {
            /* Brand Colors — KSB blue scale */
            --color-primary: #0070AF;
            --color-primary-dark: #005A8C;
            --color-primary-medium: #58A6D0;
            --color-primary-light: #D0E3F2;

            /* Semantic Colors - Light Mode */
            --color-success: #10B981;
            --color-success-dark: #059669;
            --color-success-bg: #D1FAE5;
            --color-danger: #EF4444;
            --color-danger-dark: #DC2626;
            --color-danger-bg: #FEE2E2;
            --color-warning: #F59E0B;
            --color-warning-dark: #D97706;
            --color-warning-bg: #FEF3C7;
            --color-info: #0070AF;
            --color-info-bg: #D0E3F2;

            /* Light Mode — white card on blue-tinted neutral page,
               near-black text with a slight blue undertone. */
            --bg-primary: #FFFFFF;
            --bg-secondary: #F4F7FB;
            --bg-tertiary: #E6EDF5;
            --bg-hover: #D8E3EF;
            --text-primary: #0B1220;
            --text-secondary: #2A3441;
            --text-tertiary: #5A6573;
            --border-color: #DCE4EE;
            --shadow-sm: 0 1px 2px 0 rgba(11, 18, 32, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(11, 18, 32, 0.1), 0 2px 4px -1px rgba(11, 18, 32, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(11, 18, 32, 0.1), 0 4px 6px -2px rgba(11, 18, 32, 0.05);

            /* Sidebar (carries the login screen's blue identity into the
               app chrome). White text on a vertical KSB-blue gradient,
               with active items as white pills containing blue text. */
            --sidebar-bg: linear-gradient(180deg, #0070AF 0%, #005A8C 100%);
            --sidebar-text: #FFFFFF;
            --sidebar-text-muted: rgba(255, 255, 255, 0.78);
            --sidebar-text-subtle: rgba(255, 255, 255, 0.6);
            --sidebar-hover: rgba(255, 255, 255, 0.14);
            --sidebar-group-bg: rgba(255, 255, 255, 0.08);
            --sidebar-active-bg: #FFFFFF;
            --sidebar-active-text: #005A8C;
            --sidebar-border: rgba(255, 255, 255, 0.15);
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            /* Brand — same blue, plus a slightly brighter hover tone for
               readability on the deep-black surfaces. */
            --color-primary: #0070AF;
            --color-primary-dark: #1E8AC9;
            --color-primary-medium: #58A6D0;
            --color-primary-light: rgba(0, 112, 175, 0.18);

            /* Semantic Colors - Dark Mode */
            --color-success: #10B981;
            --color-success-dark: #059669;
            --color-success-bg: rgba(16, 185, 129, 0.1);
            --color-danger: #EF4444;
            --color-danger-dark: #DC2626;
            --color-danger-bg: rgba(239, 68, 68, 0.1);
            --color-warning: #F59E0B;
            --color-warning-dark: #D97706;
            --color-warning-bg: rgba(245, 158, 11, 0.1);
            --color-info: #0070AF;
            --color-info-bg: rgba(0, 112, 175, 0.1);

            /* Cards (--bg-primary) sit a step lighter than the page
               (--bg-secondary) so shadows lift them visibly off the surface.
               Both surfaces carry a subtle blue undertone to match the brand. */
            --bg-primary: #102032;
            --bg-secondary: #050A12;
            --bg-tertiary: #1B2D44;
            --bg-hover: #284866;
            --text-primary: #FFFFFF;
            --text-secondary: #E2E8F0;
            --text-tertiary: #CBD5E1;
            --border-color: #2D3B4F;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.6);
            --shadow-md: 0 6px 14px -2px rgba(0, 0, 0, 0.65), 0 3px 6px -2px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 28px -6px rgba(0, 0, 0, 0.7), 0 8px 12px -4px rgba(0, 0, 0, 0.55);

            /* Sidebar in dark mode — slightly deeper blue gradient so it
               still ties to the brand but doesn't blow out against the
               near-black page surface. */
            --sidebar-bg: linear-gradient(180deg, #005A8C 0%, #102032 100%);
            --sidebar-text: #FFFFFF;
            --sidebar-text-muted: rgba(255, 255, 255, 0.75);
            --sidebar-text-subtle: rgba(255, 255, 255, 0.55);
            --sidebar-hover: rgba(255, 255, 255, 0.10);
            --sidebar-group-bg: rgba(255, 255, 255, 0.06);
            --sidebar-active-bg: #FFFFFF;
            --sidebar-active-text: #005A8C;
            --sidebar-border: rgba(255, 255, 255, 0.10);
        }

        /* Prevent flash of unstyled content */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #root {
            min-height: 100vh;
        }

        /* Loading screen */
        .initial-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f9fafb;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error display */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fef2f2;
            padding: 20px;
        }

        .error-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .error-box h2 {
            color: #dc2626;
            margin: 0 0 15px 0;
        }

        .error-box pre {
            background: #f9fafb;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }

        /* Global Theme Styles for Common Elements */
        .bg-white {
            background-color: var(--bg-primary) !important;
        }

        .bg-gray-50 {
            background-color: var(--bg-secondary) !important;
        }

        .bg-gray-100 {
            background-color: var(--bg-tertiary) !important;
        }

        .text-gray-800, .text-gray-900 {
            color: var(--text-primary) !important;
        }

        .text-gray-600, .text-gray-700 {
            color: var(--text-secondary) !important;
        }

        .text-gray-500 {
            color: var(--text-tertiary) !important;
        }

        .border, .border-t, .border-b, .border-r, .border-l {
            border-color: var(--border-color) !important;
        }

        .border-gray-200, .border-gray-300 {
            border-color: var(--border-color) !important;
        }

        .shadow-sm {
            box-shadow: var(--shadow-sm) !important;
        }

        .shadow, .shadow-md {
            box-shadow: var(--shadow-md) !important;
        }

        .shadow-lg {
            box-shadow: var(--shadow-lg) !important;
        }

        /* Card-like elements */
        .rounded-lg, .rounded {
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Hover states for interactive elements */
        button:not([style*="background"]):hover {
            opacity: 0.9;
        }

        /* Table hover effects */
        tr:hover {
            background-color: var(--bg-hover) !important;
        }

        /* Input and select elements */
        input, select, textarea {
            background-color: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-tertiary) !important;
        }

        /* Smooth transitions for theme changes */
        * {
            transition-property: background-color, border-color, color;
            transition-duration: 0.3s;
            transition-timing-function: ease;
        }

        /* Prevent transition on page load */
        .no-transition * {
            transition: none !important;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            /* Hide sidebar on mobile by default */
            .sidebar-desktop {
                display: none !important;
            }

            /* Full width content on mobile */
            .container {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            /* Stack form fields */
            .form-grid {
                grid-template-columns: 1fr !important;
            }

            /* Adjust button sizes for touch */
            button {
                min-height: 44px;
                padding: 12px 16px;
            }

            /* Table responsive */
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            /* Card adjustments */
            .card {
                margin-left: 0 !important;
                margin-right: 0 !important;
            }

            /* Flex column on mobile */
            .flex-mobile-col {
                flex-direction: column !important;
            }

            /* Hide less important columns */
            .hide-mobile {
                display: none !important;
            }

            /* Full width inputs */
            input, select, textarea {
                width: 100% !important;
                font-size: 16px !important; /* Prevents zoom on iOS */
            }

            /* Modal adjustments */
            .modal-content {
                width: 95% !important;
                max-width: 95% !important;
                margin: 10px !important;
            }

            /* Top bar adjustments */
            .top-bar {
                padding: 8px 12px !important;
            }

            /* Grid adjustments */
            .grid-cols-2, .grid-cols-3, .grid-cols-4 {
                grid-template-columns: 1fr !important;
            }
        }

        /* Small mobile screens */
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            h1 {
                font-size: 1.5rem !important;
            }

            h2 {
                font-size: 1.25rem !important;
            }

            .container {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
    </style>

    <script>
        // THEME INITIALIZATION - Must run before anything else to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <script>
        // PERMANENT CACHE PREVENTION SYSTEM
        (function() {
            'use strict';

            // Version control - increment this when making changes
            const APP_VERSION = '6.7.0';

            console.log('🚀 Initializing Purchase Requisition Approval System (PRAS) v' + APP_VERSION);

            // Clear all caches aggressively
            function clearAllCaches() {
                // Clear service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        registrations.forEach(function(registration) {
                            registration.unregister();
                            console.log('✓ Service worker unregistered');
                        });
                    });
                }

                // Clear cache storage
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        names.forEach(function(name) {
                            caches.delete(name);
                            console.log('✓ Cache deleted:', name);
                        });
                    });
                }

                // Clear old localStorage items except auth
                try {
                    const keysToKeep = ['authToken', 'currentUser'];
                    const allKeys = Object.keys(localStorage);
                    allKeys.forEach(key => {
                        if (!keysToKeep.includes(key)) {
                            localStorage.removeItem(key);
                        }
                    });
                } catch (e) {
                    console.warn('Could not clear localStorage:', e);
                }

                // Clear sessionStorage version tracking
                const storedVersion = sessionStorage.getItem('appVersion');
                if (storedVersion !== APP_VERSION) {
                    console.log('🔄 Version changed from', storedVersion, 'to', APP_VERSION);
                    sessionStorage.setItem('appVersion', APP_VERSION);
                    // Force reload on version change
                    if (storedVersion && storedVersion !== 'undefined') {
                        console.log('🔄 Reloading due to version change...');
                        window.location.reload(true);
                        return;
                    }
                }
                sessionStorage.setItem('appVersion', APP_VERSION);
            }

            // Run cache clearing immediately
            clearAllCaches();

            // Global error handler
            window.addEventListener('error', function(event) {
                console.error('❌ Global error:', event.error);

                const root = document.getElementById('root');
                if (root && !root.innerHTML.trim()) {
                    root.innerHTML = `
                        <div class="error-container">
                            <div class="error-box">
                                <h2>⚠️ Application Error</h2>
                                <p><strong>Message:</strong> ${event.message}</p>
                                <p><strong>File:</strong> ${event.filename}</p>
                                <p><strong>Line:</strong> ${event.lineno}:${event.colno}</p>
                                <pre>${event.error ? event.error.stack : 'No stack trace available'}</pre>
                                <button onclick="location.reload(true)"
                                    style="background: #3b82f6; color: white; padding: 10px 20px;
                                           border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                    Reload Page
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            // Detect React loading
            window.addEventListener('DOMContentLoaded', function() {
                console.log('✓ DOM loaded');

                setTimeout(function() {
                    if (typeof React === 'undefined') {
                        console.error('❌ React failed to load!');
                        document.getElementById('root').innerHTML = `
                            <div class="error-container">
                                <div class="error-box">
                                    <h2>⚠️ React Failed to Load</h2>
                                    <p>The React library could not be loaded. Please check your internet connection.</p>
                                    <button onclick="location.reload(true)"
                                        style="background: #3b82f6; color: white; padding: 10px 20px;
                                               border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                        Retry
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        console.log('✓ React loaded successfully, version:', React.version);
                    }
                }, 1000);
            });
        })();
    </script>
</head>
<body>
    <!-- Root element where React app will mount -->
    <div id="root">
        <div class="initial-loading">
            <div style="text-align: center;">
                <div class="spinner" style="margin: 0 auto 20px;"></div>
                <p style="color: #6b7280;">Loading Purchase Requisition Approval System (PRAS)...</p>
            </div>
        </div>
    </div>

    <!-- Load configuration -->
    <script src="config.js?v=1.0.0"></script>
    <!-- Load the application JavaScript -->
    <script src="app.js?v=7.1.0"></script>

    <script>
        // Verify app loaded
        setTimeout(function() {
            const root = document.getElementById('root');
            const loading = root.querySelector('.initial-loading');

            if (loading && loading.parentNode === root) {
                console.warn('⚠️ App did not mount after 5 seconds, checking for errors...');

                // Check if app.js loaded
                if (typeof window.App === 'undefined') {
                    console.error('❌ app.js failed to load or define App component');
                    root.innerHTML = `
                        <div class="error-container">
                            <div class="error-box">
                                <h2>⚠️ Application Failed to Load</h2>
                                <p>The application JavaScript file (app.js) failed to load or initialize.</p>
                                <p><strong>Possible causes:</strong></p>
                                <ul style="margin: 10px 0; padding-left: 20px;">
                                    <li>Backend server is not running</li>
                                    <li>app.js file is missing or corrupted</li>
                                    <li>JavaScript syntax error in app.js</li>
                                </ul>
                                <p><strong>Solution:</strong> Check the browser console for detailed error messages.</p>
                                <button onclick="window.location.href='/'"
                                    style="background: #3b82f6; color: white; padding: 10px 20px;
                                           border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                    Reload Application
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
        }, 5000);
    </script>
</body>
</html>
