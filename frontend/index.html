<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Requisition Approval System (PRAS)</title>

    <!-- Inter — primary typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React 18 from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <!-- SheetJS for XLSX parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        /* Theme CSS Variables
           Identity is blue / white / black. Neutrals carry a faint blue
           undertone so the whole app reads as one family. Semantic colors
           (success/danger/warning) are kept for meaning-bearing UI only —
           status badges, validation, etc. — not decoration. */
        :root {
            /* Typography */
            --font-family-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            --font-size-xs:    0.6875rem;  /* 11px */
            --font-size-sm:    0.75rem;    /* 12px */
            --font-size-base:  0.875rem;   /* 14px */
            --font-size-md:    0.9375rem;  /* 15px */
            --font-size-lg:    1.0625rem;  /* 17px */
            --font-size-xl:    1.25rem;    /* 20px */
            --font-size-2xl:   1.5rem;     /* 24px */
            --font-weight-normal:   400;
            --font-weight-medium:   500;
            --font-weight-semibold: 600;
            --font-weight-bold:     700;
            --line-height-tight:   1.25;
            --line-height-snug:    1.375;
            --line-height-normal:  1.5;
            --line-height-relaxed: 1.625;
            --letter-spacing-tight: -0.025em;
            --letter-spacing-snug:  -0.015em;
            --letter-spacing-wide:   0.025em;
            --letter-spacing-wider:  0.06em;

            /* Brand Colors — KSB blue scale */
            --color-primary: #0070AF;
            --color-primary-dark: #005A8C;
            --color-primary-medium: #58A6D0;
            --color-primary-light: #D0E3F2;

            /* Semantic Colors - Light Mode */
            --color-success: #10B981;
            --color-success-dark: #059669;
            --color-success-bg: #D1FAE5;
            --color-danger: #EF4444;
            --color-danger-dark: #DC2626;
            --color-danger-bg: #FEE2E2;
            --color-warning: #F59E0B;
            --color-warning-dark: #D97706;
            --color-warning-bg: #FEF3C7;
            --color-info: #0070AF;
            --color-info-bg: #D0E3F2;

            /* Light Mode — white card on blue-tinted neutral page,
               near-black text with a slight blue undertone. */
            --bg-primary: #FFFFFF;
            --bg-secondary: #F4F7FB;
            --bg-tertiary: #E6EDF5;
            --bg-hover: #D8E3EF;
            --text-primary: #0B1220;
            --text-secondary: #2A3441;
            --text-tertiary: #5A6573;
            --border-color: #DCE4EE;
            --shadow-sm: 0 1px 2px 0 rgba(11, 18, 32, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(11, 18, 32, 0.1), 0 2px 4px -1px rgba(11, 18, 32, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(11, 18, 32, 0.1), 0 4px 6px -2px rgba(11, 18, 32, 0.05);

            /* Sidebar — deep near-black chrome. Blue is a wayfinding
               accent only (active item background, logo highlight); the
               sidebar itself stays neutral so the rest of the UI can
               breathe. */
            --sidebar-bg: #0B1220;
            --sidebar-text: #FFFFFF;
            --sidebar-text-muted: rgba(255, 255, 255, 0.72);
            --sidebar-text-subtle: rgba(255, 255, 255, 0.45);
            --sidebar-hover: rgba(255, 255, 255, 0.06);
            --sidebar-group-bg: transparent;
            --sidebar-active-bg: var(--color-primary);
            --sidebar-active-text: #FFFFFF;
            --sidebar-border: rgba(255, 255, 255, 0.08);
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            /* Brand — same blue, plus a slightly brighter hover tone for
               readability on the deep-black surfaces. */
            --color-primary: #0070AF;
            --color-primary-dark: #1E8AC9;
            --color-primary-medium: #58A6D0;
            --color-primary-light: rgba(0, 112, 175, 0.18);

            /* Semantic Colors - Dark Mode */
            --color-success: #10B981;
            --color-success-dark: #059669;
            --color-success-bg: rgba(16, 185, 129, 0.1);
            --color-danger: #EF4444;
            --color-danger-dark: #DC2626;
            --color-danger-bg: rgba(239, 68, 68, 0.1);
            --color-warning: #F59E0B;
            --color-warning-dark: #D97706;
            --color-warning-bg: rgba(245, 158, 11, 0.1);
            --color-info: #0070AF;
            --color-info-bg: rgba(0, 112, 175, 0.1);

            /* Cards (--bg-primary) sit a step lighter than the page
               (--bg-secondary) so shadows lift them visibly off the surface.
               Both surfaces carry a subtle blue undertone to match the brand. */
            --bg-primary: #102032;
            --bg-secondary: #050A12;
            --bg-tertiary: #1B2D44;
            --bg-hover: #284866;
            --text-primary: #FFFFFF;
            --text-secondary: #E2E8F0;
            --text-tertiary: #CBD5E1;
            --border-color: #2D3B4F;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.6);
            --shadow-md: 0 6px 14px -2px rgba(0, 0, 0, 0.65), 0 3px 6px -2px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 28px -6px rgba(0, 0, 0, 0.7), 0 8px 12px -4px rgba(0, 0, 0, 0.55);

            /* Sidebar — same neutral chrome treatment in dark mode. */
            --sidebar-bg: #050A12;
            --sidebar-text: #FFFFFF;
            --sidebar-text-muted: rgba(255, 255, 255, 0.68);
            --sidebar-text-subtle: rgba(255, 255, 255, 0.40);
            --sidebar-hover: rgba(255, 255, 255, 0.05);
            --sidebar-group-bg: transparent;
            --sidebar-active-bg: var(--color-primary);
            --sidebar-active-text: #FFFFFF;
            --sidebar-border: rgba(255, 255, 255, 0.06);
        }

        /* ===================================================================
           Brand button override layer (option 9A).

           Tailwind's saturated 500–700 action shades — bg-blue-N, bg-green-N,
           bg-purple-N, bg-orange-N, bg-yellow-N — were sprinkled across ~100
           buttons during early development, none of them matching the KSB
           blue palette. Rather than touch every call site, collapse them all
           into the brand tokens here. Side effect: any *new* code using these
           Tailwind classes automatically gets the brand treatment too.

           Light 100/200 shades (used for outline-style status pills) are
           intentionally not overridden — only the action/CTA shades.

           Red 500–700 is left alone because:
             - the Rejected status pill needs to stay solid red,
             - Reject buttons get a separate targeted conversion to
               outline red in app.js (preserves the danger signal
               without the heavy filled treatment).
           =================================================================== */

        .bg-blue-500, .bg-blue-600, .bg-blue-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-blue-600:hover,
        .hover\:bg-blue-700:hover,
        .hover\:bg-blue-800:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-green-500, .bg-green-600, .bg-green-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-green-600:hover,
        .hover\:bg-green-700:hover,
        .hover\:bg-green-800:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-purple-500, .bg-purple-600, .bg-purple-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-purple-700:hover,
        .hover\:bg-purple-800:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-orange-500, .bg-orange-600, .bg-orange-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-orange-700:hover,
        .hover\:bg-orange-800:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-yellow-500, .bg-yellow-600, .bg-yellow-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-yellow-700:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-amber-500, .bg-amber-600, .bg-amber-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-amber-700:hover,
        .hover\:bg-amber-800:hover {
            background-color: var(--color-primary-dark) !important;
        }

        .bg-pink-500, .bg-pink-600, .bg-pink-700,
        .bg-emerald-500, .bg-emerald-600, .bg-emerald-700,
        .bg-cyan-500, .bg-cyan-600, .bg-cyan-700,
        .bg-indigo-500, .bg-indigo-600, .bg-indigo-700,
        .bg-teal-500, .bg-teal-600, .bg-teal-700 {
            background-color: var(--color-primary) !important;
        }
        .hover\:bg-pink-700:hover, .hover\:bg-emerald-700:hover,
        .hover\:bg-cyan-700:hover, .hover\:bg-indigo-700:hover,
        .hover\:bg-teal-700:hover {
            background-color: var(--color-primary-dark) !important;
        }

        /* ===================================================================
           Semantic button classes — three-tier hierarchy.

           Layout modifiers (w-full, flex-1, min-w-[...]) are composed
           alongside these. Size variants (.btn-sm / .btn-lg) adjust
           padding and type only.
           =================================================================== */

        .btn-primary,
        .btn-secondary,
        .btn-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            font-family: var(--font-family-sans);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            line-height: 1.25;
            white-space: nowrap;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease,
                        border-color 0.15s ease, opacity 0.15s ease;
        }
        .btn-primary:disabled,
        .btn-secondary:disabled,
        .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Primary — solid brand blue */
        .btn-primary {
            background-color: var(--color-primary);
            color: #FFFFFF;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: var(--color-primary-dark);
        }

        /* Secondary — ghost with border; respects dark mode surfaces */
        .btn-secondary {
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            border-color: var(--border-color);
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--bg-tertiary);
            border-color: var(--color-primary-medium);
        }

        /* Danger — outlined red for reversible destructive actions */
        .btn-danger {
            background-color: transparent;
            color: var(--color-danger);
            border-color: var(--color-danger);
        }
        .btn-danger:hover:not(:disabled) {
            background-color: var(--color-danger-bg);
        }

        /* Size modifiers */
        .btn-sm {
            padding: 0.25rem 0.625rem;
            font-size: var(--font-size-sm);
            border-radius: 0.375rem;
        }
        .btn-lg {
            padding: 0.75rem 1.5rem;
            font-weight: var(--font-weight-semibold);
        }

        /* Text accents tighter to brand */
        .text-blue-600, .text-blue-700 { color: var(--color-primary) !important; }
        .text-blue-800, .text-blue-900 { color: var(--color-primary-dark) !important; }
        .hover\:text-blue-700:hover,
        .hover\:text-blue-800:hover,
        .hover\:text-blue-900:hover { color: var(--color-primary-dark) !important; }

        /* Tailwind blue-100/200 tints (used for active sidebar pills, info
           banners) → translucent brand blue so they stay subtle. */
        .bg-blue-50  { background-color: rgba(0, 112, 175, 0.06) !important; }
        .bg-blue-100 { background-color: rgba(0, 112, 175, 0.10) !important; }

        /* Prevent flash of unstyled content */
        body {
            margin: 0;
            font-family: var(--font-family-sans);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-normal);
            line-height: var(--line-height-relaxed);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Inter numeric stylistic sets: cleaner figures, better legibility */
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Heading defaults — weight/tracking only; size left to Tailwind classes */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-family-sans);
            font-weight: var(--font-weight-semibold);
            line-height: var(--line-height-snug);
            letter-spacing: var(--letter-spacing-snug);
            margin: 0;
        }

        /* Tabular figures keep number columns aligned in tables */
        th, td {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11", "tnum";
        }

        /* Form labels — slightly smaller and medium weight for visual separation */
        label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
        }

        #root {
            min-height: 100vh;
        }

        /* Loading screen */
        .initial-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-secondary);
        }

        .spinner {
            border: 3px solid var(--bg-tertiary);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error display */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fef2f2;
            padding: 20px;
        }

        .error-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .error-box h2 {
            color: #dc2626;
            margin: 0 0 15px 0;
        }

        .error-box pre {
            background: #f9fafb;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }

        /* Global Theme Styles for Common Elements */
        .bg-white {
            background-color: var(--bg-primary) !important;
        }

        .bg-gray-50 {
            background-color: var(--bg-secondary) !important;
        }

        .bg-gray-100 {
            background-color: var(--bg-tertiary) !important;
        }

        .text-gray-800, .text-gray-900 {
            color: var(--text-primary) !important;
        }

        .text-gray-600, .text-gray-700 {
            color: var(--text-secondary) !important;
        }

        .text-gray-500 {
            color: var(--text-tertiary) !important;
        }

        .border, .border-t, .border-b, .border-r, .border-l {
            border-color: var(--border-color) !important;
        }

        .border-gray-200, .border-gray-300 {
            border-color: var(--border-color) !important;
        }

        .shadow-sm {
            box-shadow: var(--shadow-sm) !important;
        }

        .shadow, .shadow-md {
            box-shadow: var(--shadow-md) !important;
        }

        .shadow-lg {
            box-shadow: var(--shadow-lg) !important;
        }

        /* Card-like elements */
        .rounded-lg, .rounded {
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Hover states for interactive elements */
        button:not([style*="background"]):hover {
            opacity: 0.9;
        }

        /* Table hover effects */
        tr:hover {
            background-color: var(--bg-hover) !important;
        }

        /* Input and select elements */
        input, select, textarea {
            background-color: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-tertiary) !important;
        }

        /* Smooth transitions for theme changes */
        * {
            transition-property: background-color, border-color, color;
            transition-duration: 0.3s;
            transition-timing-function: ease;
        }

        /* Prevent transition on page load */
        .no-transition * {
            transition: none !important;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            /* Hide sidebar on mobile by default */
            .sidebar-desktop {
                display: none !important;
            }

            /* Full width content on mobile */
            .container {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            /* Stack form fields */
            .form-grid {
                grid-template-columns: 1fr !important;
            }

            /* Adjust button sizes for touch */
            button {
                min-height: 44px;
                padding: 12px 16px;
            }

            /* Table responsive */
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            /* Card adjustments */
            .card {
                margin-left: 0 !important;
                margin-right: 0 !important;
            }

            /* Flex column on mobile */
            .flex-mobile-col {
                flex-direction: column !important;
            }

            /* Hide less important columns */
            .hide-mobile {
                display: none !important;
            }

            /* Full width inputs */
            input, select, textarea {
                width: 100% !important;
                font-size: 16px !important; /* Prevents zoom on iOS */
            }

            /* Modal adjustments */
            .modal-content {
                width: 95% !important;
                max-width: 95% !important;
                margin: 10px !important;
            }

            /* Top bar adjustments */
            .top-bar {
                padding: 8px 12px !important;
            }

            /* Grid adjustments */
            .grid-cols-2, .grid-cols-3, .grid-cols-4 {
                grid-template-columns: 1fr !important;
            }
        }

        /* Small mobile screens */
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            h1 {
                font-size: 1.5rem !important;
            }

            h2 {
                font-size: 1.25rem !important;
            }

            .container {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
        }
    </style>

    <script>
        // THEME INITIALIZATION - Must run before anything else to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <script>
        // PERMANENT CACHE PREVENTION SYSTEM
        (function() {
            'use strict';

            // Version control - increment this when making changes
            const APP_VERSION = '6.7.0';

            console.log('Initializing Purchase Requisition Approval System (PRAS) v' + APP_VERSION);

            // Clear all caches aggressively
            function clearAllCaches() {
                // Clear service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        registrations.forEach(function(registration) {
                            registration.unregister();
                            console.log('Service worker unregistered');
                        });
                    });
                }

                // Clear cache storage
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        names.forEach(function(name) {
                            caches.delete(name);
                            console.log('Cache deleted:', name);
                        });
                    });
                }

                // Clear old localStorage items except auth
                try {
                    const keysToKeep = ['authToken', 'currentUser'];
                    const allKeys = Object.keys(localStorage);
                    allKeys.forEach(key => {
                        if (!keysToKeep.includes(key)) {
                            localStorage.removeItem(key);
                        }
                    });
                } catch (e) {
                    console.warn('Could not clear localStorage:', e);
                }

                // Clear sessionStorage version tracking
                const storedVersion = sessionStorage.getItem('appVersion');
                if (storedVersion !== APP_VERSION) {
                    console.log('Version changed from', storedVersion, 'to', APP_VERSION);
                    sessionStorage.setItem('appVersion', APP_VERSION);
                    // Force reload on version change
                    if (storedVersion && storedVersion !== 'undefined') {
                        console.log('Reloading due to version change...');
                        window.location.reload(true);
                        return;
                    }
                }
                sessionStorage.setItem('appVersion', APP_VERSION);
            }

            // Run cache clearing immediately
            clearAllCaches();

            // Global error handler
            window.addEventListener('error', function(event) {
                console.error('Global error:', event.error);

                const root = document.getElementById('root');
                if (root && !root.innerHTML.trim()) {
                    root.innerHTML = `
                        <div class="error-container">
                            <div class="error-box">
                                <h2>Application Error</h2>
                                <p><strong>Message:</strong> ${event.message}</p>
                                <p><strong>File:</strong> ${event.filename}</p>
                                <p><strong>Line:</strong> ${event.lineno}:${event.colno}</p>
                                <pre>${event.error ? event.error.stack : 'No stack trace available'}</pre>
                                <button onclick="location.reload(true)"
                                    style="background: #3b82f6; color: white; padding: 10px 20px;
                                           border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                    Reload Page
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            // Detect React loading
            window.addEventListener('DOMContentLoaded', function() {
                console.log('DOM loaded');

                setTimeout(function() {
                    if (typeof React === 'undefined') {
                        console.error('React failed to load!');
                        document.getElementById('root').innerHTML = `
                            <div class="error-container">
                                <div class="error-box">
                                    <h2>React Failed to Load</h2>
                                    <p>The React library could not be loaded. Please check your internet connection.</p>
                                    <button onclick="location.reload(true)"
                                        style="background: #3b82f6; color: white; padding: 10px 20px;
                                               border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                        Retry
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        console.log('React loaded successfully, version:', React.version);
                    }
                }, 1000);
            });
        })();
    </script>
</head>
<body>
    <!-- Root element where React app will mount -->
    <div id="root">
        <div class="initial-loading">
            <div style="text-align: center;">
                <div class="spinner" style="margin: 0 auto 24px;"></div>
                <p style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.02em;">Loading PRAS…</p>
            </div>
        </div>
    </div>

    <!-- Load configuration -->
    <script src="config.js?v=1.0.0"></script>
    <!-- Load the application JavaScript -->
    <script src="app.js?v=7.1.0"></script>

    <script>
        // Verify app loaded
        setTimeout(function() {
            const root = document.getElementById('root');
            const loading = root.querySelector('.initial-loading');

            if (loading && loading.parentNode === root) {
                console.warn('App did not mount after 5 seconds, checking for errors...');

                // Check if app.js loaded
                if (typeof window.App === 'undefined') {
                    console.error('app.js failed to load or define App component');
                    root.innerHTML = `
                        <div class="error-container">
                            <div class="error-box">
                                <h2>Application Failed to Load</h2>
                                <p>The application JavaScript file (app.js) failed to load or initialize.</p>
                                <p><strong>Possible causes:</strong></p>
                                <ul style="margin: 10px 0; padding-left: 20px;">
                                    <li>Backend server is not running</li>
                                    <li>app.js file is missing or corrupted</li>
                                    <li>JavaScript syntax error in app.js</li>
                                </ul>
                                <p><strong>Solution:</strong> Check the browser console for detailed error messages.</p>
                                <button onclick="window.location.href='/'"
                                    style="background: #3b82f6; color: white; padding: 10px 20px;
                                           border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;">
                                    Reload Application
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
        }, 5000);
    </script>
</body>
</html>
