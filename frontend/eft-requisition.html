<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFT Requisition Form - Purchase Requisition System</title>
    <!-- Auth gate: redirect anonymous visitors to login before paint.
         Client-side only — backend re-validates JWT on every API call. -->
    <script>
      (function() {
        var token = localStorage.getItem('authToken');
        var userData = localStorage.getItem('userData');
        if (!token || !userData) { window.location.replace('index.html'); return; }
        try {
          var payload = JSON.parse(atob(token.split('.')[1]));
          if (payload.exp && payload.exp * 1000 < Date.now()) {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userData');
            localStorage.removeItem('refreshToken');
            window.location.replace('index.html');
          }
        } catch (e) { window.location.replace('index.html'); }
      })();
    </script>
    <!-- Inter typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Shared financial form styles -->
    <link rel="stylesheet" href="forms.css">
    <style>
        .nav-header { max-width: 800px; }
        .container  { max-width: 800px; }

        /* EFT uses bordered section boxes */
        .form-section {
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-surface);
        }

        /* Inline loading (not fullscreen overlay) */
        .loading {
            position: static;
            background: transparent;
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading .spinner {
            border-color: #E6EDF5;
            border-top-color: var(--color-primary);
            width: 36px;
            height: 36px;
        }
    </style>
</head>
<body>
    <!-- Navigation Header -->
    <div class="nav-header">
        <a href="index.html" class="nav-btn nav-btn-home">
            Home
        </a>
        <button onclick="goBack()" class="nav-btn nav-btn-back">
            <span>&#8592;</span> Back
        </button>
    </div>

    <div class="container">
        <h1>EFT / Cheque Requisition Form</h1>

        <div id="eftLockBanner">
            <strong>EFT module is currently closed.</strong>
            <div id="eftLockBannerText" style="margin-top:4px; font-size:14px;"></div>
        </div>

        <div id="alert" class="alert"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <form id="eftForm">
            <!-- Initiator Information -->
            <div class="form-section">
                <h2>Initiator Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="initiator_name">Initiator Name</label>
                        <input type="text" id="initiator_name" readonly>
                    </div>
                    <div class="form-group">
                        <label for="initiator_department">Department</label>
                        <input type="text" id="initiator_department" readonly>
                    </div>
                </div>
            </div>

            <!-- Basic Information -->
            <div class="form-section">
                <h2>Requisition Details</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="eft_chq_number">EFT / Cheque Number</label>
                        <input type="number" id="eft_chq_number" placeholder="Enter number">
                        <div class="help-text">Leave blank if not yet assigned</div>
                    </div>
                    <div class="form-group">
                        <label for="account_code">Account Code</label>
                        <input type="text" id="account_code" placeholder="e.g., 5000-100">
                    </div>
                </div>
            </div>

            <!-- Amount Section -->
            <div class="form-section">
                <h2>Amount Information</h2>
                <div class="form-group">
                    <label for="amount">Amount (K) <span class="required">*</span></label>
                    <input type="number" id="amount" step="0.01" required
                           placeholder="Enter amount" onchange="convertAmountToWords()">
                </div>
                <div class="amount-display" id="amountDisplay">K 0.00</div>
                <div class="amount-words-display" id="amountWords">Amount in words will appear here</div>
            </div>

            <!-- Beneficiary Information -->
            <div class="form-section">
                <h2>Beneficiary Details</h2>
                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="payToMyself" style="width: 20px; height: 20px; margin-right: 10px;" onchange="togglePayToMyself()">
                        <span style="font-size: 14px;">Pay to myself (auto-fill my details)</span>
                    </label>
                </div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="in_favour_of">In Favour Of (Payee Name) <span class="required">*</span></label>
                        <input type="text" id="in_favour_of" required
                               placeholder="Enter beneficiary name">
                    </div>
                    <div class="form-group">
                        <label for="bank_name">Bank Name</label>
                        <input type="text" id="bank_name" placeholder="e.g., Zanaco Bank">
                    </div>
                    <div class="form-group">
                        <label for="branch">Branch</label>
                        <input type="text" id="branch" placeholder="e.g., Cairo Road">
                    </div>
                    <div class="form-group full-width">
                        <label for="bank_account_number">Bank Account Number</label>
                        <input type="text" id="bank_account_number"
                               placeholder="Enter account number">
                    </div>
                </div>
            </div>

            <!-- Purpose Section -->
            <div class="form-section">
                <h2>Purpose & Description</h2>
                <div class="form-group">
                    <label for="purpose">Purpose <span class="required">*</span></label>
                    <textarea id="purpose" required
                              placeholder="Briefly describe the purpose of this payment"></textarea>
                </div>
                <div class="form-group">
                    <label for="description">Additional Description</label>
                    <textarea id="description"
                              placeholder="Any additional details or notes"></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
                <button type="submit" class="btn btn-primary">Submit Requisition</button>
            </div>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        const API_URL = window.API_URL || 'http://localhost:3001/api';

        // Initialize form with user data
        document.addEventListener('DOMContentLoaded', function() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            document.getElementById('initiator_name').value = userData.full_name || '';
            document.getElementById('initiator_department').value = userData.department || '';
            refreshEFTSchedule();
            setInterval(refreshEFTSchedule, 30000);
        });

        // Time-window gate: matches backend/utils/eftSchedule.js. Backend
        // re-checks on submit; this is just UX.
        let eftCanCreate = true;
        async function refreshEFTSchedule() {
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch(`${API_URL}/eft-requisitions/schedule`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return;
                const access = await res.json();
                eftCanCreate = !!access.canCreate;
                const banner = document.getElementById('eftLockBanner');
                const submitBtn = document.querySelector('#eftForm button[type="submit"]');
                if (!access.canCreate) {
                    const next = access.nextCreateOpen ? new Date(access.nextCreateOpen) : null;
                    const nextStr = next ? new Intl.DateTimeFormat('en-GB', {
                        timeZone: 'Africa/Lusaka', weekday: 'long', hour: '2-digit', minute: '2-digit', hour12: false
                    }).format(next) + ' (CAT)' : '';
                    document.getElementById('eftLockBannerText').textContent =
                        'Window: 05:00–11:00 (Mon–Fri, CAT). ' + (nextStr ? 'Next available: ' + nextStr + '.' : '');
                    banner.style.display = 'block';
                    if (submitBtn) {
                        submitBtn.disabled = true;
                        submitBtn.style.opacity = '0.55';
                        submitBtn.style.cursor = 'not-allowed';
                        submitBtn.title = 'EFT module is currently closed';
                    }
                } else {
                    banner.style.display = 'none';
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.style.opacity = '';
                        submitBtn.style.cursor = '';
                        submitBtn.title = '';
                    }
                }
            } catch (e) {
                // Network error — leave state alone; backend will still reject if closed.
            }
        }

        // Toggle pay to myself
        function togglePayToMyself() {
            const checkbox = document.getElementById('payToMyself');
            const payeeField = document.getElementById('in_favour_of');
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');

            if (checkbox.checked) {
                payeeField.value = userData.full_name || '';
            } else {
                payeeField.value = '';
            }
        }

        // Number to words conversion
        function convertAmountToWords() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            document.getElementById('amountDisplay').textContent = 'K ' + amount.toFixed(2);

            if (amount === 0) {
                document.getElementById('amountWords').textContent = 'Amount in words will appear here';
                return;
            }

            const words = numberToWords(amount);
            document.getElementById('amountWords').textContent = words + ' Kwacha Only';
        }

        function numberToWords(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            const teens = ['Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];

            if (num === 0) return 'Zero';

            // Split into kwacha and ngwee
            const kwacha = Math.floor(num);
            const ngwee = Math.round((num - kwacha) * 100);

            let result = '';

            // Convert kwacha
            if (kwacha >= 1000000) {
                result += numberToWordsHelper(Math.floor(kwacha / 1000000)) + ' Million ';
                const remainder = kwacha % 1000000;
                if (remainder > 0) {
                    result += numberToWordsHelper(remainder);
                }
            } else {
                result = numberToWordsHelper(kwacha);
            }

            // Add ngwee if present
            if (ngwee > 0) {
                result += ' and ' + numberToWordsHelper(ngwee) + ' Ngwee';
            }

            return result.trim();
        }

        function numberToWordsHelper(num) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            const teens = ['Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];

            if (num === 0) return '';
            if (num < 10) return ones[num];
            if (num < 20) return teens[num - 10];
            if (num < 100) {
                return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? ' ' + ones[num % 10] : '');
            }
            if (num < 1000) {
                return ones[Math.floor(num / 100)] + ' Hundred' +
                       (num % 100 !== 0 ? ' and ' + numberToWordsHelper(num % 100) : '');
            }
            if (num < 1000000) {
                return numberToWordsHelper(Math.floor(num / 1000)) + ' Thousand' +
                       (num % 1000 !== 0 ? ' ' + numberToWordsHelper(num % 1000) : '');
            }

            return num.toString();
        }

        // Form submission
        document.getElementById('eftForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!eftCanCreate) {
                showAlert('The EFT module is currently closed. Please try again during the next open window.', 'error');
                return;
            }

            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount', 'error');
                return;
            }

            const amountInWords = document.getElementById('amountWords').textContent;

            const eftData = {
                eft_chq_number: document.getElementById('eft_chq_number').value || null,
                amount: amount,
                amount_in_words: amountInWords,
                in_favour_of: document.getElementById('in_favour_of').value,
                bank_account_number: document.getElementById('bank_account_number').value || null,
                bank_name: document.getElementById('bank_name').value || null,
                branch: document.getElementById('branch').value || null,
                purpose: document.getElementById('purpose').value,
                account_code: document.getElementById('account_code').value || null,
                description: document.getElementById('description').value || null,
                department: document.getElementById('initiator_department').value || null
            };

            try {
                showLoading(true);
                const token = localStorage.getItem('authToken');

                const response = await fetch(`${API_URL}/forms/eft-requisitions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(eftData)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('EFT requisition submitted successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Failed to submit EFT requisition', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An error occurred while submitting the requisition', 'error');
            } finally {
                showLoading(false);
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Navigation function
        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.hostname)) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
