<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picking Slip - Internal Approvals System</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230070AF'/%3E%3Cpath d='M8 4h10l6 6v18a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z' fill='white'/%3E%3Cpath d='M18 4v6h6' fill='%23D0E3F2'/%3E%3Cpath d='M10 19 L14 23 L22 14' stroke='%230070AF' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <!-- Auth gate: redirect anonymous visitors to login before paint. -->
    <script>
      (function() {
        var token = localStorage.getItem('authToken');
        var userData = localStorage.getItem('userData');
        if (!token || !userData) { window.location.replace('index.html'); return; }
        try {
          var payload = JSON.parse(atob(token.split('.')[1]));
          if (payload.exp && payload.exp * 1000 < Date.now()) {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userData');
            localStorage.removeItem('refreshToken');
            window.location.replace('index.html');
          }
        } catch (e) { window.location.replace('index.html'); }
      })();
    </script>
    <!-- Inter typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Shared financial form styles -->
    <link rel="stylesheet" href="forms.css">
    <style>
        .nav-header { max-width: 1000px; }
        .container  { max-width: 1000px; }

        /* Info banner at top of picking slip */
        .info-banner {
            background: rgba(0, 112, 175, 0.08);
            color: var(--color-primary);
            border: 1px solid rgba(0, 112, 175, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Navigation Header -->
    <div class="nav-header">
        <a href="index.html" class="nav-btn nav-btn-home">
            Home
        </a>
        <a href="index.html" class="nav-btn nav-btn-back">
            <span>&#8592;</span> Back
        </a>
    </div>

    <div class="container">
        <h1>Picking Slip</h1>

        <div class="info-banner">
            
            <span>Picking slips do not require approval and are completed immediately upon submission.</span>
        </div>

        <div id="alert" class="alert"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <form id="pickingSlipForm">
            <!-- Picking Information -->
            <div class="form-section">
                <h2>Picking Information</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="picked_by">Picked By *</label>
                        <select id="picked_by_select" onchange="handleUserSelect('picked_by')">
                            <option value="">-- Select from users --</option>
                            <option value="__other__">Other (type manually)</option>
                        </select>
                        <input type="text" id="picked_by" style="display:none; margin-top:5px;" placeholder="Type name of person">
                    </div>
                    <div class="form-group">
                        <label for="destination">Destination *</label>
                        <input type="text" id="destination" required placeholder="Where items are going">
                    </div>
                    <div class="form-group">
                        <label for="delivery_location">Delivery Location</label>
                        <input type="text" id="delivery_location" placeholder="Where items will be delivered">
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department">
                            <option value="">Select Department</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Operations">Operations</option>
                            <option value="Procurement">Procurement</option>
                            <option value="Executive">Executive</option>
                            <option value="Sales">Sales</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reference_number">Reference Number</label>
                        <input type="text" id="reference_number" placeholder="Optional reference">
                    </div>
                    <div class="form-group">
                        <label for="customer">Customer</label>
                        <select id="customer">
                            <option value="">-- Select customer (optional) --</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" placeholder="Any additional notes or remarks"></textarea>
                    </div>
                </div>
            </div>

            <!-- Items -->
            <div class="form-section">
                <h2>Items to Pick</h2>
                <button type="button" class="btn btn-add" onclick="addItemRow()">+ Add Item</button>
                <div class="table-container">
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th style="width: 50px;">#</th>
                                <th style="width: 120px;">Item Code</th>
                                <th>Description *</th>
                                <th style="width: 80px;">Qty *</th>
                                <th style="width: 80px;">Unit</th>
                                <th style="width: 60px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody">
                            <!-- Rows will be added here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
                <button type="submit" class="btn btn-primary">Submit Picking Slip</button>
            </div>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        const API_URL = window.API_URL || 'http://localhost:3001/api';
        let rowCounter = 0;

        let usersList = [];

        // Initialize form
        document.addEventListener('DOMContentLoaded', async function() {
            // Load user data for default values
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            if (userData.department) {
                document.getElementById('department').value = userData.department;
            }

            // Load users and vendors for dropdowns
            await loadUsers();
            await loadVendors();

            // Pre-select current user in picked_by dropdown
            if (userData.full_name) {
                const select = document.getElementById('picked_by_select');
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === userData.full_name) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }

            // Add initial row
            addItemRow();
        });

        async function loadUsers() {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    usersList = await response.json();
                    populateUserDropdown('picked_by_select');
                }
            } catch (e) {
                console.error('Failed to load users:', e);
            }
        }

        function populateUserDropdown(selectId) {
            const select = document.getElementById(selectId);
            usersList.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.full_name;
                opt.textContent = `${u.full_name} (${u.department || ''})`;
                select.insertBefore(opt, select.lastElementChild);
            });
        }

        async function loadVendors() {
            try {
                const token = localStorage.getItem('authToken');
                const response = await fetch(`${API_URL}/vendors`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const vendors = await response.json();
                    const select = document.getElementById('customer');
                    vendors.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = v.name;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Failed to load vendors:', e);
            }
        }

        function handleUserSelect(fieldId) {
            const select = document.getElementById(fieldId + '_select');
            const input = document.getElementById(fieldId);
            if (select.value === '__other__') {
                input.style.display = 'block';
                input.required = true;
                input.focus();
            } else {
                input.style.display = 'none';
                input.required = false;
                input.value = '';
            }
        }

        function addItemRow() {
            rowCounter++;
            const tbody = document.getElementById('itemsTableBody');
            const row = tbody.insertRow();

            row.innerHTML = `
                <td>${rowCounter}</td>
                <td><input type="text" class="item_code" placeholder="Code"></td>
                <td><input type="text" class="description" required placeholder="Item description"></td>
                <td><input type="number" class="quantity" min="1" step="1" value="1" required></td>
                <td>
                    <select class="unit">
                        <option value="pcs">pcs</option>
                        <option value="kg">kg</option>
                        <option value="ltr">ltr</option>
                        <option value="box">box</option>
                        <option value="set">set</option>
                        <option value="roll">roll</option>
                        <option value="pack">pack</option>
                    </select>
                </td>
                <td><button type="button" class="btn btn-danger" onclick="deleteRow(this)">X</button></td>
            `;
        }

        function deleteRow(button) {
            if (document.getElementById('itemsTableBody').rows.length > 1) {
                button.closest('tr').remove();
                // Renumber rows
                const rows = document.getElementById('itemsTableBody').rows;
                for (let i = 0; i < rows.length; i++) {
                    rows[i].cells[0].textContent = i + 1;
                }
                rowCounter = rows.length;
            } else {
                showAlert('At least one item is required', 'error');
            }
        }

        document.getElementById('pickingSlipForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const rows = document.getElementById('itemsTableBody').rows;
            if (rows.length === 0) {
                showAlert('Please add at least one item', 'error');
                return;
            }

            // Validate items
            const items = [];
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const description = row.querySelector('.description').value.trim();
                const quantity = parseFloat(row.querySelector('.quantity').value);

                if (!description) {
                    showAlert(`Please enter a description for row ${i + 1}`, 'error');
                    return;
                }

                if (!quantity || quantity <= 0) {
                    showAlert(`Please enter a valid quantity for row ${i + 1}`, 'error');
                    return;
                }

                items.push({
                    item_code: row.querySelector('.item_code').value.trim(),
                    item_name: description,
                    description: description,
                    quantity: quantity,
                    unit: row.querySelector('.unit').value
                });
            }

            const pickedBySelect = document.getElementById('picked_by_select').value;
            const pickedBy = (pickedBySelect && pickedBySelect !== '__other__') ? pickedBySelect : document.getElementById('picked_by').value.trim();
            const destination = document.getElementById('destination').value.trim();

            if (!pickedBy) {
                showAlert('Please enter who picked the items', 'error');
                return;
            }

            if (!destination) {
                showAlert('Please enter the destination', 'error');
                return;
            }

            const slipData = {
                picked_by: pickedBy,
                destination: destination,
                delivery_location: document.getElementById('delivery_location').value.trim(),
                department: document.getElementById('department').value,
                reference_number: document.getElementById('reference_number').value.trim(),
                customer: document.getElementById('customer').value,
                remarks: document.getElementById('remarks').value.trim(),
                items: items
            };

            try {
                showLoading(true);
                const token = localStorage.getItem('authToken');

                const response = await fetch(`${API_URL}/stores/picking-slips`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(slipData)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Picking slip created successfully!', 'success');
                    document.getElementById('pickingSlipForm').reset();
                    document.getElementById('itemsTableBody').innerHTML = '';
                    rowCounter = 0;
                    addItemRow();
                } else {
                    showAlert(data.error || 'Failed to create picking slip', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An error occurred while creating the picking slip', 'error');
            } finally {
                showLoading(false);
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

    </script>
</body>
</html>
