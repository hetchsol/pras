services:
  - type: web
    name: pras
    runtime: node
    buildCommand: cd backend && npm install && node init-db.js
    startCommand: npm start
    plan: starter
    disk:
      name: purchase-req-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /opt/render/project/src/backend/purchase_requisition.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: 7
      - key: BCRYPT_ROUNDS
        value: 10
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: ALLOWED_ORIGINS
        value: https://pras.onrender.com
      - key: SESSION_SECRET
        generateValue: true
