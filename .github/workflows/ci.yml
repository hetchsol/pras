name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run smoke tests
        working-directory: backend
        env:
          JWT_SECRET: ci-jwt-secret-long-enough-to-pass-the-boot-guard-abcdefghijklmn
          NODE_ENV: test
        run: npm test
